[global.config]
  as = 11111
  router-id = "10.10.10.1"

[global.apply-policy.config]
  default-export-policy = "accept-route"
  default-import-policy = "accept-route"
  
[[neighbors]]
  [neighbors.config]
    neighbor-address = "1.0.0.1"
    peer-as = 65111
  [neighbors.ebgp-multihop.config]
    enabled = true
    multihop-ttl = 10
  [neighbors.timers.config]
    connect-retry = 1

[[neighbors]]
  [neighbors.config]
    neighbor-address = "2.0.0.2"
    peer-as = 65111
  [neighbors.ebgp-multihop.config]
    enabled = true
    multihop-ttl = 10
  [neighbors.timers.config]
    connect-retry = 1