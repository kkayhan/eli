set / system mtu default-ip-mtu 9000

delete / system grpc-server eda-discovery
delete / system grpc-server eda-insecure-mgmt
delete / system grpc-server eda-mgmt

# 1) Numbered loopback to provide the borrowed IPv4 address
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 100.1.1.100/32
set / bfd subinterface system0.0 admin-state enable

# 2) Data interfaces using IPv4 unnumbered (borrowing from system0.0)
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 1 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 unnumbered interface system0.0

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 1 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 unnumbered interface system0.0

# 3) Bind interfaces to the default network-instance
set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/1.1
set / network-instance default interface ethernet-1/2.1

# 4) OSPFv2 instance using the unnumbered P2P interface
set / network-instance default router-id 100.1.1.100
set / network-instance default protocols ospf instance main admin-state enable
set / network-instance default protocols ospf instance main version ospf-v2
set / network-instance default protocols ospf instance main max-ecmp-paths 64
set / network-instance default protocols ospf instance main area 1.1.1.1
set / network-instance default protocols ospf instance main area 1.1.1.1 interface system0.0
set / network-instance default protocols ospf instance main area 1.1.1.1 interface ethernet-1/1.1 interface-type point-to-point
set / network-instance default protocols ospf instance main area 1.1.1.1 interface ethernet-1/2.1 interface-type point-to-point

# BGP Configuration

set / network-instance default protocols bgp autonomous-system 1
set / network-instance default protocols bgp router-id 100.1.1.100
set / network-instance default protocols bgp route-advertisement rapid-withdrawal true

set / network-instance default protocols bgp afi-safi evpn admin-state enable
set / network-instance default protocols bgp afi-safi evpn evpn rapid-update true
set / network-instance default protocols bgp afi-safi evpn multipath ibgp maximum-paths 64

set / network-instance default protocols bgp group core
set / network-instance default protocols bgp group core route-reflector client true
set / network-instance default protocols bgp group core route-reflector cluster-id 100.1.1.100
set / network-instance default protocols bgp group core failure-detection enable-bfd true

set / network-instance default protocols bgp dynamic-neighbors accept match 0.0.0.0/0 peer-group core
set / network-instance default protocols bgp dynamic-neighbors accept match 0.0.0.0/0 allowed-peer-as [ 1 ]

set / network-instance default protocols bgp afi-safi evpn add-paths receive true
set / network-instance default protocols bgp afi-safi evpn add-paths send true
set / network-instance default protocols bgp afi-safi evpn add-paths send-max 16

#######


#### Aliasing

set / routing-policy policy everything default-action policy-result accept

## L3 Service
set / tunnel-interface vxlan0 vxlan-interface 100 type routed
set / tunnel-interface vxlan0 vxlan-interface 100 ingress vni 500

set / interface ethernet-1/10 vlan-tagging true

set / interface ethernet-1/10 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/10 subinterface 1 ipv4 address 123.0.0.0/31
set / interface ethernet-1/10 subinterface 1 vlan encap single-tagged vlan-id 1
set / bfd subinterface ethernet-1/10.1 admin-state enable

set / network-instance aliasing_l3 type ip-vrf
set / network-instance aliasing_l3 admin-state enable
set / network-instance aliasing_l3 interface ethernet-1/10.1
set / network-instance aliasing_l3 vxlan-interface vxlan0.100
set / network-instance aliasing_l3 protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance aliasing_l3 protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan0.100
set / network-instance aliasing_l3 protocols bgp-evpn bgp-instance 1 evi 500
set / network-instance aliasing_l3 protocols bgp-evpn bgp-instance 1 ecmp 8
set / network-instance aliasing_l3 protocols bgp-vpn bgp-instance 1
